name: Export SBOM

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  export-sbom:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install SBOM generator
        run: |
          python -m pip install --upgrade pip
          pip install cyclonedx-bom

      - name: Generate CycloneDX SBOM
        run: |
          if [ -f requirements.txt ]; then
            cyclonedx-py requirements requirements.txt --output-file sbom.cdx.json
          else
            cyclonedx-py requirements requirements-dev.txt --output-file sbom.cdx.json
          fi

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
